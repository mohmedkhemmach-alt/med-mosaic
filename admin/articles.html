<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — Admin · Med Mosaic</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" />
  <style>
    :root {
      --deep:#020b18;--navy:#061a30;--teal:#0d7d8c;--cyan:#00c9c8;
      --white:#ffffff;--text:#cce8f0;--muted:#7fb3c8;
      --card-bg:rgba(6,26,48,0.85);--glow:0 0 24px rgba(0,201,200,0.25);--r:12px;--sidebar:240px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Cairo',sans-serif;background:var(--deep);color:var(--text);display:flex;min-height:100vh;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--navy);}::-webkit-scrollbar-thumb{background:var(--teal);border-radius:3px;}
    .sidebar{width:var(--sidebar);flex-shrink:0;background:rgba(2,11,24,0.98);border-right:1px solid rgba(0,201,200,0.1);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
    .sidebar-brand{padding:20px 16px;border-bottom:1px solid rgba(0,201,200,0.1);}
    .brand-name{font-size:16px;font-weight:800;color:var(--white);}
    .brand-sub{font-size:10px;font-weight:600;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;}
    .nav-section{padding:16px 10px 8px;}
    .nav-section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:0 6px;margin-bottom:6px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;transition:all .2s;margin-bottom:2px;}
    .nav-item:hover{background:rgba(0,201,200,0.08);color:var(--text);}
    .nav-item.active{background:rgba(0,201,200,0.12);color:var(--cyan);}
    .nav-badge{margin-left:auto;background:#e73946;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;}
    .sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid rgba(0,201,200,0.1);}
    .logout-btn{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;text-decoration:none;padding:8px 10px;border-radius:8px;transition:all .2s;}
    .logout-btn:hover{color:#e73946;background:rgba(231,57,70,0.08);}
    .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;}
    .topbar{background:rgba(6,26,48,0.97);border-bottom:1px solid rgba(0,201,200,0.1);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .topbar-title{font-size:15px;font-weight:700;color:var(--white);}
    .btn-primary{background:linear-gradient(135deg,var(--teal),var(--cyan));color:var(--deep);font-weight:700;font-size:13px;font-family:inherit;padding:8px 18px;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s;}
    .btn-primary:hover{opacity:.85;}
    .content{padding:24px;flex:1;}
    .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;max-width:320px;}
    .search-input{width:100%;background:var(--card-bg);border:1px solid rgba(0,201,200,0.18);color:var(--text);padding:9px 12px 9px 36px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;}
    .search-input:focus{border-color:var(--cyan);}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);}
    .filter-sel{background:var(--card-bg);border:1px solid rgba(0,201,200,0.18);color:var(--text);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;cursor:pointer;}
    .card{background:var(--card-bg);border:1px solid rgba(0,201,200,0.1);border-radius:var(--r);overflow:hidden;}
    .card-header{padding:16px 20px;border-bottom:1px solid rgba(0,201,200,0.08);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-size:14px;font-weight:700;color:var(--white);}
    .table{width:100%;border-collapse:collapse;}
    .table th{text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;padding:10px 20px;border-bottom:1px solid rgba(0,201,200,0.08);}
    .table td{padding:13px 20px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);}
    .table tr:last-child td{border-bottom:none;}
    .table tr:hover td{background:rgba(0,201,200,0.04);}
    .status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;}
    .s-pub{background:rgba(45,198,83,0.15);color:#2dc653;}
    .s-pend{background:rgba(255,193,7,0.15);color:#ffc107;}
    .s-draft{background:rgba(255,255,255,0.07);color:var(--muted);}
    .s-arch{background:rgba(231,57,70,0.12);color:#f1727d;}
    .emoji-cell{font-size:22px;width:36px;text-align:center;}
    .art-title{color:var(--white);font-weight:600;font-size:13px;max-width:260px;}
    .art-title small{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;}
    .action-row{display:flex;gap:6px;}
    .action-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:11px;font-family:inherit;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .2s;}
    .action-btn:hover{border-color:rgba(0,201,200,0.4);color:var(--cyan);}
    .action-btn.del:hover{border-color:rgba(231,57,70,0.4);color:#f1727d;}
    .pagination{display:flex;gap:6px;justify-content:center;padding:20px;}
    .page-btn{background:var(--card-bg);border:1px solid rgba(0,201,200,0.15);color:var(--muted);width:32px;height:32px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
    .page-btn:hover,.page-btn.active{background:rgba(0,201,200,0.15);border-color:var(--cyan);color:var(--cyan);}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(2,11,24,0.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:rgba(6,26,48,0.98);border:1px solid rgba(0,201,200,0.2);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.6);}
    .modal-header{padding:20px 24px;border-bottom:1px solid rgba(0,201,200,0.1);display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-size:16px;font-weight:700;color:var(--white);}
    .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
    .modal-close:hover{color:var(--white);}
    .modal-body{padding:24px;}
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:.3px;}
    .form-input,.form-select,.form-textarea{width:100%;background:rgba(0,201,200,0.04);border:1.5px solid rgba(0,201,200,0.15);color:var(--white);padding:10px 14px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan);}
    .form-textarea{resize:vertical;min-height:120px;}
    .form-select option{background:var(--navy);}
    .modal-footer{padding:16px 24px;border-top:1px solid rgba(0,201,200,0.08);display:flex;gap:10px;justify-content:flex-end;}
    .btn-cancel{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-weight:600;font-size:13px;font-family:inherit;padding:8px 18px;border-radius:8px;cursor:pointer;}
    .btn-cancel:hover{color:var(--white);}
  </style>
<script>(function(){var t=localStorage.getItem('adminToken');if(!t){window.location.href='../login.html';}window.adminToken=t;})();</script>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand"><div class="brand-name">MED MOSAIC</div><div class="brand-sub">Admin Panel</div></div>
  <div class="nav-section">
    <div class="nav-section-label">Overview</div>
    <a href="dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">Content</div>
    <a href="articles.html" class="nav-item active"><span>📰</span> Articles</a>
    <a href="comments.html" class="nav-item"><span>💬</span> Comments <span class="nav-badge">3</span></a>
    <a href="breaking.html" class="nav-item"><span>⚡</span> Breaking News</a>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">People</div>
    <a href="users.html" class="nav-item"><span>👥</span> Users</a>
    <a href="permissions.html" class="nav-item"><span>🔐</span> Permissions</a>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">System</div>
    <a href="ai.html" class="nav-item"><span>🤖</span> AI Services</a>
    <a href="settings.html" class="nav-item"><span>⚙️</span> Settings</a>
  </div>
  <div class="sidebar-footer">
    <a href="../index.html" class="logout-btn">↗ View Site</a>
    <a href="../login.html" class="logout-btn">⇠ Sign Out</a>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-title">📰 Articles Management</div>
    <button class="btn-primary" onclick="openModal()">＋ New Article</button>
  </div>
  <div class="content">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search articles..." oninput="filterTable(this.value)">
      </div>
      <select class="filter-sel" onchange="filterStatus(this.value)">
        <option value="">All Status</option>
        <option value="published">Published</option>
        <option value="pending">Pending</option>
        <option value="draft">Draft</option>
        <option value="archived">Archived</option>
      </select>
      <select class="filter-sel" onchange="filterTag(this.value)">
        <option value="">All Tags</option>
        <option>Biodiversity</option>
        <option>Pollution</option>
        <option>Climate</option>
        <option>Conservation</option>
        <option>Research</option>
      </select>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">All Articles <span id="artCount" style="color:var(--muted);font-weight:400;font-size:12px"></span></div>
      </div>
      <table class="table" id="articlesTable">
        <thead>
          <tr>
            <th>#</th><th>Article</th><th>Tag</th><th>Author</th><th>Status</th><th>Views</th><th>Date</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="articlesTbody"></tbody>
      </table>
      <div class="pagination">
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">›</button>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Article</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Emoji</label>
        <input class="form-input" id="fEmoji" value="📰" style="width:80px">
      </div>
      <div class="form-group">
        <label class="form-label">Title (Arabic)</label>
        <input class="form-input" id="fTitle" placeholder="عنوان المقال بالعربية">
      </div>
      <div class="form-group">
        <label class="form-label">Title (French)</label>
        <input class="form-input" id="fTitleFr" placeholder="Titre de l'article en français">
      </div>
      <div class="form-group">
        <label class="form-label">Title (English)</label>
        <input class="form-input" id="fTitleEn" placeholder="Article title in English">
      </div>
      <div class="form-group">
        <label class="form-label">Content</label>
        <textarea class="form-textarea" id="fContent" placeholder="Article content..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Tag / Category</label>
          <select class="form-select" id="fTag">
            <option>Biodiversity</option><option>Pollution</option><option>Climate</option>
            <option>Conservation</option><option>Research</option><option>Tourism</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="fStatus">
            <option value="draft">Draft</option><option value="pending">Pending Review</option><option value="published">Published</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveArticle()">Save Article</button>
    </div>
  </div>
</div>

<script>
let articles = [
  {id:1,emoji:"🐠",title:"12 New Fish Species in the Indian Ocean",tag:"Biodiversity",author:"Dr. Sara Benali",status:"published",views:2140,date:"Jan 15"},
  {id:2,emoji:"🏭",title:"Plastic Pollution in the Mediterranean",tag:"Pollution",author:"Editorial Team",status:"published",views:3850,date:"Jan 12"},
  {id:3,emoji:"🌡️",title:"Rising Ocean Temperatures Threaten Coral Reefs",tag:"Climate",author:"Ahmed Hosseini",status:"pending",views:1920,date:"Jan 10"},
  {id:4,emoji:"🌿",title:"Morocco Launches Coastline Protection Initiative",tag:"Conservation",author:"Nadia Mansouri",status:"published",views:4100,date:"Jan 8"},
  {id:5,emoji:"🔬",title:"Microorganisms Feed on Ocean Plastic",tag:"Research",author:"Dr. Yasmine Ouzou",status:"published",views:2780,date:"Jan 5"},
  {id:6,emoji:"🧹",title:"Agadir Beach Cleanup — 15 Tons of Waste Removed",tag:"Conservation",author:"Rachid Ziyani",status:"draft",views:1560,date:"Jan 3"},
];
let editId = null;

function statusClass(s){return s==='published'?'s-pub':s==='pending'?'s-pend':s==='archived'?'s-arch':'s-draft';}

function renderTable(list){
  const tbody=document.getElementById('articlesTbody');
  document.getElementById('artCount').textContent='('+list.length+')';
  tbody.innerHTML=list.map(a=>`
    <tr id="row-${a.id}">
      <td class="emoji-cell">${a.emoji}</td>
      <td><div class="art-title">${a.title}<small>${a.tag}</small></div></td>
      <td><span class="status s-draft">${a.tag}</span></td>
      <td style="color:var(--muted);font-size:12px">${a.author}</td>
      <td><span class="status ${statusClass(a.status)}">${a.status}</span></td>
      <td style="color:var(--muted)">${a.views.toLocaleString()}</td>
      <td style="color:var(--muted);font-size:12px">${a.date}</td>
      <td>
        <div class="action-row">
          <button class="action-btn" onclick="editArticle(${a.id})">✏️ Edit</button>
          <button class="action-btn" onclick="toggleStatus(${a.id})">${a.status==='published'?'⬇ Unpublish':'✓ Publish'}</button>
          <button class="action-btn del" onclick="deleteArticle(${a.id})">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function filterTable(q){renderTable(articles.filter(a=>a.title.toLowerCase().includes(q.toLowerCase())||a.author.toLowerCase().includes(q.toLowerCase())));}
function filterStatus(s){renderTable(s?articles.filter(a=>a.status===s):articles);}
function filterTag(t){renderTable(t?articles.filter(a=>a.tag===t):articles);}

function openModal(){editId=null;document.getElementById('modalTitle').textContent='New Article';document.getElementById('fTitle').value='';document.getElementById('fTitleFr').value='';document.getElementById('fTitleEn').value='';document.getElementById('fContent').value='';document.getElementById('fEmoji').value='📰';document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeOnBg(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function editArticle(id){
  const a=articles.find(x=>x.id===id);if(!a)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit Article';
  document.getElementById('fEmoji').value=a.emoji;
  document.getElementById('fTitle').value=a.title;
  document.getElementById('fTitleFr').value='';
  document.getElementById('fTitleEn').value='';
  document.getElementById('fContent').value='';
  document.getElementById('fStatus').value=a.status;
  document.getElementById('modalOverlay').classList.add('open');
}

function saveArticle(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){alert('Title is required');return;}
  if(editId){
    const a=articles.find(x=>x.id===editId);
    if(a){a.title=title;a.emoji=document.getElementById('fEmoji').value;a.tag=document.getElementById('fTag').value;a.status=document.getElementById('fStatus').value;}
  } else {
    articles.unshift({id:Date.now(),emoji:document.getElementById('fEmoji').value,title,tag:document.getElementById('fTag').value,author:'Admin',status:document.getElementById('fStatus').value,views:0,date:'Today'});
  }
  renderTable(articles);closeModal();
}

function toggleStatus(id){
  const a=articles.find(x=>x.id===id);
  if(!a)return;
  a.status=a.status==='published'?'draft':'published';
  renderTable(articles);
}

function deleteArticle(id){
  if(!confirm('Delete this article?'))return;
  articles=articles.filter(x=>x.id!==id);
  renderTable(articles);
}

renderTable(articles);
</script>
</body>
</html>
