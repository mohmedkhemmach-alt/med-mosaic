<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Login — Med Mosaic</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" />
  <style>
    :root {
      --deep:    #020b18;
      --navy:    #061a30;
      --ocean:   #0a3a5c;
      --teal:    #0d7d8c;
      --cyan:    #00c9c8;
      --foam:    #e0f7f7;
      --white:   #ffffff;
      --text:    #cce8f0;
      --muted:   #7fb3c8;
      --card-bg: rgba(6,26,48,0.85);
      --glow:    0 0 24px rgba(0,201,200,0.25);
      --r:       14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', 'Tajawal', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      color: var(--text);
      background:
        linear-gradient(160deg, rgba(2,11,24,.92) 0%, rgba(10,58,92,.82) 55%, rgba(13,125,140,.55) 100%),
        url('https://picsum.photos/seed/ocean/1600/1000') center/cover no-repeat fixed;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 3px; }

    /* ── NAVBAR ── */
    .navbar {
      background: rgba(2,11,24,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,201,200,0.12);
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }
    .logo { display: flex; align-items: center; gap: .7rem; text-decoration: none; }
    .logo-img { height: 44px; width: 44px; object-fit: contain; transition: transform .3s; }
    .logo:hover .logo-img { transform: rotate(-5deg) scale(1.08); }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-name { font-size: 1.05rem; font-weight: 800; color: var(--white); letter-spacing: .5px; }
    .logo-sub  { font-size: .65rem; color: var(--cyan); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    .nav-lang-switcher { display: flex; gap: .3rem; }
    .nav-lang-btn {
      background: none; border: 1px solid rgba(0,201,200,0.25);
      color: var(--muted); font-size: .8rem; font-family: inherit;
      padding: .3rem .6rem; border-radius: 6px; cursor: pointer; transition: all .2s;
    }
    .nav-lang-btn.active, .nav-lang-btn:hover { background: var(--cyan); color: var(--deep); border-color: var(--cyan); font-weight: 700; }

    /* ── LOGIN PAGE ── */
    .login-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card {
      background: var(--card-bg);
      border: 1px solid rgba(0,201,200,0.18);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45), var(--glow);
      backdrop-filter: blur(10px);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-img-big {
      height: 64px; width: 64px; object-fit: contain; border-radius: 14px;
      display: block; margin: 0 auto 12px;
      filter: drop-shadow(0 0 16px rgba(0,201,200,0.4));
    }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--white); }
    .login-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .tabs { display: flex; gap: 4px; background: rgba(0,201,200,0.06); border: 1px solid rgba(0,201,200,0.1); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .tab {
      flex: 1; padding: 9px; text-align: center; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; color: var(--muted); border: none; background: transparent;
      font-family: 'Cairo', sans-serif;
    }
    .tab.active { background: linear-gradient(135deg, var(--teal), var(--cyan)); color: var(--deep); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 1.5px solid rgba(0,201,200,0.18); border-radius: 10px;
      font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; color: var(--white);
      background: rgba(0,201,200,0.05);
      transition: border-color 0.2s, background 0.2s;
    }
    .form-group input:focus { border-color: var(--cyan); background: rgba(0,201,200,0.1); }
    .form-group input::placeholder { color: var(--muted); }

    .forgot { font-size: 12px; color: var(--cyan); cursor: pointer; font-weight: 600; }
    .forgot:hover { opacity: .8; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      color: var(--deep);
      border: none; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform .2s; margin-top: 8px;
      box-shadow: 0 6px 20px rgba(0,201,200,0.25);
    }
    .submit-btn:hover { opacity: .88; transform: translateY(-1px); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,201,200,0.15); }
    .divider span { font-size: 12px; color: var(--muted); }

    .social-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .social-btn {
      padding: 11px; border: 1px solid rgba(0,201,200,0.18); border-radius: 9px;
      background: rgba(0,201,200,0.05); color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 13px; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .social-btn:hover { background: rgba(0,201,200,0.12); }

    .register-form { display: none; }
    .error-msg { background: rgba(230,57,70,0.12); border: 1px solid rgba(230,57,70,0.3); color: #ff8a8a; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .success-msg { background: rgba(0,201,200,0.1); border: 1px solid rgba(0,201,200,0.3); color: var(--cyan); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }

    [dir="rtl"] .form-group label { flex-direction: row-reverse; }
  </style>
</head>

        <h1 data-i18n="brandName">Med Mosaic</h1>
        <p data-i18n="brandTagline">Marine environment and ocean news platform</p>
      </div>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login', this)" data-i18n="tabLogin">Login</button>
        <button class="tab" id="tab-register" onclick="showTab('register', this)" data-i18n="tabRegister">Create Account</button>
      </div>

      <!-- LOGIN -->
      <div class="login-form" id="login-form">
        <div class="error-msg" id="login-error"></div>
        <div class="form-group">
          <label data-i18n="emailLabel">Email Address</label>
          <input type="email" id="login-email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>
            <span data-i18n="passwordLabel">Password</span>
            <span class="forgot" onclick="forgotPwd()" data-i18n="forgotPwd">Forgot password?</span>
          </label>
          <input type="password" id="login-pwd" placeholder="••••••••" />
        </div>
        <button class="submit-btn" onclick="handleLogin()" data-i18n="loginBtn">Login</button>
        <div class="divider"><span data-i18n="orDivider">or</span></div>
        <div class="social-btns">
          <button class="social-btn">🔵 Google</button>
          <button class="social-btn">🔷 Facebook</button>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="register-form" id="register-form">
        <div class="success-msg" id="reg-success"></div>
        <div class="form-group">
          <label data-i18n="nameLabel">Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label data-i18n="emailLabel">Email Address</label>
          <input type="email" id="reg-email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label data-i18n="passwordLabel">Password</label>
          <input type="password" id="reg-pwd" placeholder="At least 8 characters" data-i18n-placeholder="pwdPlaceholder" />
        </div>
        <button class="submit-btn" onclick="handleRegister()" data-i18n="registerBtn">Create Account</button>
      </div>
    </div>
  </div>

  <script>
    const I18N = {
      en: {
        pageTitle: "Login — Med Mosaic",
        logoSub: "Marine Journalism",
        brandName: "Med Mosaic",
        brandTagline: "Marine environment and ocean news platform",
        tabLogin: "Login",
        tabRegister: "Create Account",
        emailLabel: "Email Address",
        passwordLabel: "Password",
        forgotPwd: "Forgot password?",
        loginBtn: "Login",
        orDivider: "or",
        nameLabel: "Full Name",
        registerBtn: "Create Account",
        pwdPlaceholder: "At least 8 characters",
        namePlaceholder: "John Doe",
        errFields: "⚠️ Please fill in all fields",
        errPwdLen: "Password must be at least 8 characters",
        successReg: "✅ Account created successfully! Redirecting...",
        forgotAlert: "A password reset link will be sent to your email"
      },
      fr: {
        pageTitle: "Connexion — Med Mosaic",
        logoSub: "Journalisme Marin",
        brandName: "Med Mosaic",
        brandTagline: "Plateforme d'actualités sur l'environnement marin et les océans",
        tabLogin: "Connexion",
        tabRegister: "Créer un compte",
        emailLabel: "Adresse e-mail",
        passwordLabel: "Mot de passe",
        forgotPwd: "Mot de passe oublié ?",
        loginBtn: "Se connecter",
        orDivider: "ou",
        nameLabel: "Nom complet",
        registerBtn: "Créer le compte",
        pwdPlaceholder: "8 caractères minimum",
        namePlaceholder: "Jean Dupont",
        errFields: "⚠️ Veuillez remplir tous les champs",
        errPwdLen: "Le mot de passe doit contenir au moins 8 caractères",
        successReg: "✅ Compte créé avec succès ! Redirection...",
        forgotAlert: "Un lien de réinitialisation sera envoyé à votre e-mail"
      },
      ar: {
        pageTitle: "تسجيل الدخول — Med Mosaic",
        logoSub: "صحافة بحرية",
        brandName: "Med Mosaic",
        brandTagline: "منصة أخبار البيئة البحرية والمحيطات",
        tabLogin: "تسجيل الدخول",
        tabRegister: "إنشاء حساب",
        emailLabel: "البريد الإلكتروني",
        passwordLabel: "كلمة المرور",
        forgotPwd: "نسيت كلمة المرور؟",
        loginBtn: "تسجيل الدخول",
        orDivider: "أو",
        nameLabel: "الاسم الكامل",
        registerBtn: "إنشاء الحساب",
        pwdPlaceholder: "8 أحرف على الأقل",
        namePlaceholder: "محمد الأمين",
        errFields: "⚠️ يرجى ملء جميع الحقول",
        errPwdLen: "كلمة المرور يجب أن تكون 8 أحرف على الأقل",
        successReg: "✅ تم إنشاء حسابك بنجاح! جارٍ التوجيه...",
        forgotAlert: "سيتم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني"
      }
    };

    let currentLang = 'en';

    function applyI18n(lang) {
      const dict = I18N[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.textContent = dict[key];
      });
      document.getElementById('reg-pwd').placeholder = dict.pwdPlaceholder;
      document.getElementById('reg-name').placeholder = dict.namePlaceholder;
      document.getElementById('page-title').textContent = dict.pageTitle;
      document.title = dict.pageTitle;
    }

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.nav-lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('lb-' + lang).classList.add('active');
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      applyI18n(lang);
      // hide any visible messages on language switch to avoid stale-language text
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('reg-success').style.display = 'none';
    }

    function showTab(tab, btn) {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value;
      const pwd = document.getElementById('login-pwd').value;
      const err = document.getElementById('login-error');
      const dict = I18N[currentLang];
      if (!email || !pwd) { err.textContent = dict.errFields; err.style.display = 'block'; return; }
      // Demo: redirect to admin if admin email
      if (email === 'admin@marine-eco.ma') { location.href = '../admin/dashboard.html'; return; }
      err.style.display = 'none';
      location.href = 'index.html';
    }

    function handleRegister() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const pwd = document.getElementById('reg-pwd').value;
      const suc = document.getElementById('reg-success');
      const dict = I18N[currentLang];
      if (!name || !email || !pwd) return;
      if (pwd.length < 8) { alert(dict.errPwdLen); return; }
      suc.textContent = dict.successReg;
      suc.style.display = 'block';
      setTimeout(() => location.href = 'index.html', 1800);
    }

    function forgotPwd() { alert(I18N[currentLang].forgotAlert); }

    // Default language: English
    document.addEventListener('DOMContentLoaded', () => setLang('en'));
  </script>
</body>
