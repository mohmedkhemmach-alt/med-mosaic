<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مقال - البيئة البحرية</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" />
  <style>
    .article-hero {
      background: linear-gradient(135deg, var(--ocean-deep) 0%, var(--ocean-mid) 100%);
      padding: 60px 0 40px;
      color: white;
    }
    .article-hero-inner { max-width: 800px; margin: 0 auto; padding: 0 24px; }
    .article-tag-hero {
      display: inline-block; background: rgba(255,255,255,0.2);
      color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px;
      font-weight: 600; margin-bottom: 16px;
    }
    .article-hero h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 700; line-height: 1.4; margin-bottom: 16px; }
    .article-hero-meta { display: flex; gap: 24px; flex-wrap: wrap; font-size: 14px; opacity: 0.85; }
    .article-hero-meta span { display: flex; align-items: center; gap: 6px; }

    .article-body { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
    .article-cover {
      width: 100%; height: 340px;
      border-radius: var(--radius); margin-bottom: 36px;
      overflow: hidden; position: relative;
      background: linear-gradient(135deg, var(--ocean-foam), var(--ocean-pale));
    }
    .article-cover img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    @media(max-width:640px) { .article-cover { height: 220px; } }
    .article-content { font-size: 17px; line-height: 1.85; color: var(--text-dark); }
    .article-content p { margin-bottom: 20px; }
    .article-content h2 { font-size: 22px; font-weight: 700; color: var(--ocean-deep); margin: 32px 0 12px; }
    .article-content h3 { font-size: 18px; font-weight: 600; color: var(--ocean-mid); margin: 24px 0 10px; }
    .article-content blockquote {
      border-right: 4px solid var(--ocean-light); padding: 12px 20px;
      background: var(--ocean-foam); border-radius: 0 8px 8px 0;
      margin: 20px 0; color: var(--text-mid); font-style: italic;
    }
    .article-content ul { margin: 12px 0 20px 20px; }
    .article-content ul li { margin-bottom: 8px; }

    .article-actions {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      margin: 36px 0; flex-wrap: wrap; gap: 12px;
    }
    .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn {
      padding: 9px 18px; border-radius: 20px; border: 1.5px solid var(--border);
      background: white; font-family: var(--font); font-size: 13px; cursor: pointer;
      font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
      color: var(--text-mid);
    }
    .action-btn:hover, .action-btn.liked { background: var(--ocean-foam); border-color: var(--ocean-light); color: var(--ocean-deep); }
    .share-btns { display: flex; gap: 8px; }
    .share-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .share-btn.tw { background: #1da1f2; color: white; }
    .share-btn.fb { background: #1877f2; color: white; }
    .share-btn.wa { background: #25d366; color: white; }
    .share-btn.cp { background: var(--ocean-foam); color: var(--ocean-deep); border: 1px solid var(--border); }

    .related-section { margin-top: 48px; }
    .related-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--ocean-deep); }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .related-card {
      background: white; border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s;
    }
    .related-card:hover { transform: translateY(-3px); }
    .related-card-img { height: 100px; overflow: hidden; background: var(--ocean-foam); }
    .related-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .related-card-body { padding: 14px; }
    .related-card-body .tag { font-size: 11px; font-weight: 600; color: var(--ocean-light); text-transform: uppercase; }
    .related-card-body h3 { font-size: 14px; font-weight: 600; margin-top: 6px; line-height: 1.4; }

    .comments-section { margin-top: 48px; }
    .comments-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--ocean-deep); }
    .comment-input-box {
      background: white; border-radius: var(--radius); padding: 20px;
      box-shadow: var(--shadow); margin-bottom: 24px;
    }
    .comment-input-box textarea {
      width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-family: var(--font); font-size: 14px; resize: vertical; min-height: 80px;
      outline: none; color: var(--text-dark); direction: rtl;
    }
    .comment-input-box textarea:focus { border-color: var(--ocean-light); }
    .comment-submit {
      margin-top: 10px; padding: 10px 24px; background: var(--ocean-deep); color: white;
      border: none; border-radius: 8px; font-family: var(--font); font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .comment-submit:hover { background: var(--ocean-mid); }
    .comment-card {
      background: white; border-radius: var(--radius); padding: 18px;
      box-shadow: var(--shadow); margin-bottom: 12px;
    }
    .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .comment-avatar {
      width: 38px; height: 38px; border-radius: 50%; background: var(--ocean-deep);
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; flex-shrink: 0;
    }
    .comment-meta { flex: 1; }
    .comment-meta .name { font-size: 14px; font-weight: 700; color: var(--ocean-deep); }
    .comment-meta .date { font-size: 12px; color: var(--text-muted); }
    .comment-text { font-size: 14px; line-height: 1.6; color: var(--text-dark); }
    .comment-likes { margin-top: 8px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
    .comment-likes:hover { color: var(--ocean-light); }

    .breadcrumb { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .breadcrumb a { color: rgba(255,255,255,0.85); }
    .breadcrumb a:hover { color: white; }

    .lang-bar { display: flex; gap: 8px; margin-top: 20px; }
    .lang-btn-art {
      padding: 6px 14px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.3);
      background: transparent; color: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font);
    }
    .lang-btn-art.active { background: white; color: var(--ocean-deep); }

    #loading-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 999; font-size: 40px; }
  </style>
</head>
<body>

  <div id="loading-overlay">🌊</div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="logo.jpg" alt="Med Mosaic Marine Journalism" style="height:40px;width:40px;object-fit:contain;border-radius:8px;" /><span>MED MOSAIC</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="news.html" class="active">News</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="chatbot.html">AI Assistant</a></li>
        <li><a href="comments.html">Comments</a></li>
      </ul>
      <div class="nav-actions">
        <div class="lang-switcher">
          <button onclick="setLang('ar')" class="lang-btn" id="lb-ar">AR</button>
          <button onclick="setLang('fr')" class="lang-btn" id="lb-fr">FR</button>
          <button onclick="setLang('en')" class="lang-btn active" id="lb-en">EN</button>
        </div>
        <a href="login.html" class="btn-login" id="auth-btn">Login</a>
      </div>
    </div>
  </nav>

  <!-- ARTICLE HERO -->
  <div class="article-hero" id="article-hero">
    <div class="article-hero-inner">
      <div class="breadcrumb">
        <a href="index.html">Home</a> ›
        <a href="news.html">News</a> ›
        <span id="breadcrumb-tag">مقال</span>
      </div>
      <span class="article-tag-hero" id="article-tag">📰 عام</span>
      <h1 id="article-title">جاري التحميل...</h1>
      <div class="article-hero-meta">
        <span>✍️ <span id="article-author">—</span></span>
        <span>📅 <span id="article-date">—</span></span>
        <span>👁 <span id="article-views">0</span> مشاهدة</span>
        <span>💬 <span id="article-comments-count">0</span> تعليق</span>
      </div>
      <div class="lang-bar">
        <button class="lang-btn-art active" onclick="translateArticle('ar')">العربية</button>
        <button class="lang-btn-art" onclick="translateArticle('fr')">Français</button>
        <button class="lang-btn-art" onclick="translateArticle('en')">English</button>
      </div>
    </div>
  </div>

  <!-- ARTICLE BODY -->
  <div class="article-body">

    <!-- COVER IMAGE -->
    <div class="article-cover" id="article-cover">
      <img id="article-cover-img" src="" alt="" loading="lazy" />
    </div>

    <!-- CONTENT -->
    <div class="article-content" id="article-content">
      <p>جاري تحميل محتوى المقال...</p>
    </div>

    <!-- ACTIONS -->
    <div class="article-actions">
      <div class="action-btns">
        <button class="action-btn" id="like-btn" onclick="toggleLike()">
          ❤️ <span id="like-count">0</span> إعجاب
        </button>
        <button class="action-btn" onclick="document.getElementById('comment-input').focus()">
          💬 أضف تعليقاً
        </button>
        <button class="action-btn" onclick="bookmarkArticle()">
          🔖 حفظ
        </button>
      </div>
      <div class="share-btns">
        <button class="share-btn tw" title="Twitter" onclick="shareOn('twitter')">𝕏</button>
        <button class="share-btn fb" title="Facebook" onclick="shareOn('facebook')">f</button>
        <button class="share-btn wa" title="WhatsApp" onclick="shareOn('whatsapp')">📱</button>
        <button class="share-btn cp" title="نسخ الرابط" onclick="copyLink()">🔗</button>
      </div>
    </div>

    <!-- RELATED ARTICLES -->
    <div class="related-section">
      <h2>📰 مقالات ذات صلة</h2>
      <div class="related-grid" id="related-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- COMMENTS SECTION -->
    <div class="comments-section">
      <h2>💬 التعليقات (<span id="comment-count-title">0</span>)</h2>

      <div class="comment-input-box" id="comment-box">
        <textarea id="comment-input" placeholder="شارك رأيك حول هذا المقال..." rows="3"></textarea>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
          <span style="font-size:12px;color:var(--text-muted)">التعليقات تخضع للمراجعة قبل النشر</span>
          <button class="comment-submit" onclick="submitComment()">إرسال التعليق</button>
        </div>
      </div>

      <div id="comments-list">
        <!-- filled by JS -->
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer style="background:var(--ocean-deep);color:white;text-align:center;padding:24px;margin-top:48px;font-size:14px;">
    <div style="display:flex;justify-content:center;margin-bottom:10px;">
      <img src="logo.jpg" alt="Med Mosaic" style="height:36px;width:36px;object-fit:contain;border-radius:8px;" />
    </div>
    <p>🌊 البيئة البحرية — جميع الحقوق محفوظة 2025</p>
  </footer>

  <script>
    // ===== DATA =====
    const FULL_ARTICLES = [
      {
        id: 1, emoji: "🐠", tag: "تنوع بيولوجي",
        title: "اكتشاف 12 نوعاً جديداً من الأسماك في أعماق المحيط الهندي",
        excerpt: "فريق من العلماء الدوليين يعلن عن اكتشاف أنواع جديدة لم تُرصد من قبل في أعماق تتجاوز 3000 متر.",
        content: `<p>في اكتشاف علمي مثير، أعلن فريق دولي من الباحثين عن رصد 12 نوعاً جديداً من الأسماك في أعماق المحيط الهندي، تتجاوز 3000 متر تحت سطح الماء. هذا الاكتشاف يُعدّ من أبرز الإنجازات البيولوجية البحرية في السنوات الأخيرة.</p>
        <h2>تفاصيل الاكتشاف</h2>
        <p>استخدم الفريق غواصات روبوتية متطورة مزودة بكاميرات عالية الدقة وأجهزة استشعار دقيقة. أجريت الرحلة على مدار ثلاثة أشهر بمشاركة علماء من 8 دول مختلفة.</p>

        <h2>أهمية الاكتشاف</h2>
        <p>تتميز هذه الأنواع بتكيّفات فريدة مع بيئة الأعماق، من بينها أعضاء توليد الضوء البيولوجي وضغط دم منخفض بشكل غير عادي. كما تبدو هذه الأسماك لديها قدرة على تحمّل درجات الحرارة القريبة من الصفر.</p>
        <ul>
          <li>3 أنواع تمتلك قدرة توهج ضوئي غير مسبوقة</li>

      },
      {

        title: "تقرير: تصاعد خطير في مستويات الميكروبلاستيك بشواطئ البحر المتوسط",
        excerpt: "دراسة جديدة تكشف أن كل كيلومتر من شواطئ المتوسط يحتوي على أكثر من 700 ألف جسيم بلاستيكي.",
        content: `<p>كشفت دراسة علمية حديثة نُشرت في مجلة Marine Pollution Bulletin عن تصاعد خطير في مستويات الميكروبلاستيك على شواطئ البحر الأبيض المتوسط. وتُشير النتائج إلى أن كل كيلومتر من هذه الشواطئ يحتوي على ما يزيد عن 700 ألف جسيم بلاستيكي دقيق.</p>

        title: "مبادرة مغربية لإعادة زراعة الشعاب المرجانية في سواحل الأطلنطي",
        excerpt: "المغرب يطلق مبادرة بيئية طموحة لإعادة توطين الشعاب المرجانية على طول سواحله الأطلنطية.",
        content: `<p>أطلقت المملكة المغربية مبادرة بيئية طموحة لإعادة زراعة الشعاب المرجانية على طول ساحلها الأطلنطي. تأتي هذه المبادرة في إطار الاستراتيجية الوطنية لحماية التنوع البيولوجي البحري وتعزيز الاقتصاد الأزرق.</p>
        <h2>تفاصيل المبادرة</h2>
        <p>تستهدف المبادرة زراعة ما يزيد عن 50,000 شعبة مرجانية على امتداد 200 كيلومتر من الساحل الأطلنطي خلال السنوات الخمس القادمة. تُنفَّذ المبادرة بالشراكة مع جامعات مغربية ومنظمات دولية متخصصة.</p>`,
        author: "وزارة البيئة المغربية", date: "٣ يناير ٢٠٢٥", views: 2880, likes: 118, img: "beach"
      }
    ];

    const SAMPLE_COMMENTS = [
      { id: 1, name: "محمد الأمين", text: "مقال رائع ومفيد جداً! شكراً على المعلومات القيمة.", date: "منذ يومين", likes: 12, avatar: "م" },
      { id: 2, name: "فاطمة الزهراء", text: "هذه المعلومات ضرورية ويجب نشرها على نطاق واسع. البيئة البحرية تحتاج إلى وعي أكبر.", date: "منذ 3 أيام", likes: 8, avatar: "ف" },
      { id: 3, name: "Youssef El Alami", text: "Très bon article, j'ai appris beaucoup de choses sur l'environnement marin.", date: "منذ أسبوع", likes: 5, avatar: "Y" }
    ];

    // ===== INIT =====
    let currentArticle = null;
    let isLiked = false;

    function getArticleId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id')) || 1;
    }

    function loadArticle() {
      const id = getArticleId();
      const article = FULL_ARTICLES.find(a => a.id === id) || FULL_ARTICLES[0];
      currentArticle = article;

      // Update page title
      document.title = `${article.title} - البيئة البحرية`;

      // Update hero
      document.getElementById('article-tag').textContent = `${article.emoji} ${article.tag}`;
      document.getElementById('breadcrumb-tag').textContent = article.tag;
      document.getElementById('article-title').textContent = article.title;
      document.getElementById('article-author').textContent = article.author;
      document.getElementById('article-date').textContent = article.date;
      document.getElementById('article-views').textContent = article.views.toLocaleString('ar');
      document.getElementById('article-comments-count').textContent = SAMPLE_COMMENTS.length;

      // Cover
      const coverImg = document.getElementById('article-cover-img');
      coverImg.src = `https://picsum.photos/seed/${article.img || 'ocean'}/1000/500`;
      coverImg.alt = article.title;

      // Content
      document.getElementById('article-content').innerHTML = article.content;

      // Likes
      document.getElementById('like-count').textContent = article.likes || 0;

      // Load related
      loadRelated(article);

      // Load comments
      loadComments();

      // Hide loading
      document.getElementById('loading-overlay').style.display = 'none';
    }

    function loadRelated(current) {
      const related = FULL_ARTICLES.filter(a => a.id !== current.id).slice(0, 3);
      const grid = document.getElementById('related-grid');
      grid.innerHTML = related.map(a => `
        <div class="related-card" onclick="location.href='article.html?id=${a.id}'">
          <div class="related-card-img"><img src="https://picsum.photos/seed/${a.img || 'ocean'}/300/200" alt="${a.title}" loading="lazy" /></div>
          <div class="related-card-body">
            <div class="tag">${a.tag}</div>
            <h3>${a.title}</h3>
          </div>
        </div>
      `).join('');
    }

    function loadComments() {
      const list = document.getElementById('comments-list');
      const count = document.getElementById('comment-count-title');
      count.textContent = SAMPLE_COMMENTS.length;
      list.innerHTML = SAMPLE_COMMENTS.map(c => `
        <div class="comment-card">
          <div class="comment-header">
            <div class="comment-avatar">${c.avatar}</div>
            <div class="comment-meta">
              <div class="name">${c.name}</div>
              <div class="date">${c.date}</div>
            </div>
          </div>
          <div class="comment-text">${c.text}</div>
          <div class="comment-likes" onclick="this.textContent='❤️ ' + (parseInt(this.dataset.likes)+1) + ' إعجاب'" data-likes="${c.likes}">
            ❤️ ${c.likes} إعجاب
          </div>
        </div>
      `).join('');
    }

    function toggleLike() {
      isLiked = !isLiked;
      const btn = document.getElementById('like-btn');
      const countEl = document.getElementById('like-count');
      let count = parseInt(countEl.textContent);
      if (isLiked) { count++; btn.classList.add('liked'); btn.textContent = `❤️ ${count} إعجاب`; }
      else { count--; btn.classList.remove('liked'); btn.textContent = `🤍 ${count} إعجاب`; }
      countEl.textContent = count;
    }

    function submitComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (!text) { alert('يرجى كتابة تعليق أولاً'); return; }
      const list = document.getElementById('comments-list');
      const newCard = document.createElement('div');
      newCard.className = 'comment-card';
      newCard.style.borderRight = '3px solid var(--ocean-light)';
      newCard.innerHTML = `
        <div class="comment-header">
          <div class="comment-avatar" style="background:var(--teal)">أ</div>
          <div class="comment-meta">
            <div class="name">أنت</div>
            <div class="date">الآن · قيد المراجعة</div>
          </div>
        </div>
        <div class="comment-text">${text}</div>
        <div class="comment-likes">❤️ 0 إعجاب</div>
      `;
      list.prepend(newCard);
      input.value = '';
      const count = document.getElementById('comment-count-title');
      count.textContent = parseInt(count.textContent) + 1;
      document.getElementById('article-comments-count').textContent = parseInt(document.getElementById('article-comments-count').textContent) + 1;
    }

    function shareOn(platform) {
      const url = encodeURIComponent(location.href);
      const title = encodeURIComponent(currentArticle?.title || '');
      const urls = {
        twitter: `https://twitter.com/intent/tweet?url=${url}&text=${title}`,
        facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
        whatsapp: `https://wa.me/?text=${title}%20${url}`
      };
      if (urls[platform]) window.open(urls[platform], '_blank');
    }

    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => alert('تم نسخ الرابط!'));
    }

    function bookmarkArticle() {
      const saved = JSON.parse(localStorage.getItem('marine-saved') || '[]');
      if (!saved.includes(currentArticle?.id)) {
        saved.push(currentArticle?.id);
        localStorage.setItem('marine-saved', JSON.stringify(saved));
        alert('✅ تم حفظ المقال في قائمتك');
      } else {
        alert('المقال محفوظ بالفعل');
      }
    }

    // Translation cache to avoid repeated API calls
    const translationCache = {};

    async function translateArticle(lang) {
      // Update active button
      document.querySelectorAll('.lang-btn-art').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      // Arabic = original content
      if (lang === 'ar') {
        loadArticle();
        document.documentElement.dir = 'rtl';
        document.body.style.direction = 'rtl';
        return;
      }

      // LTR for EN/FR
      document.documentElement.dir = 'ltr';
      document.body.style.direction = 'ltr';

      const article = currentArticle;
      if (!article) return;

      const cacheKey = article.id + '_' + lang;

      // Return cached translation if available
      if (translationCache[cacheKey]) {
        applyTranslation(translationCache[cacheKey], lang);
        return;
      }

      // Show loading
      const contentEl = document.getElementById('article-content');
      contentEl.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
        <div style="font-size:2rem;margin-bottom:12px">🤖</div>
        <p style="font-size:16px">${lang === 'fr' ? 'Traduction en cours...' : 'Translating...'}</p>
        <p style="font-size:13px;margin-top:8px;opacity:.7">${lang === 'fr' ? 'Powered by Claude AI' : 'Powered by Claude AI'}</p>
      </div>`;

      const langName = lang === 'fr' ? 'French' : 'English';
      const textToTranslate = `Title: ${article.title}
Excerpt: ${article.excerpt}
Content: ${article.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim()}`;

      try {
        const GROQ_API_KEY = "YOUR_API_KEY_HERE";
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + GROQ_API_KEY
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            max_tokens: 1000,
            messages: [
              { role: 'system', content: 'You are a professional translator specializing in marine journalism. Translate the given Arabic article accurately. Return ONLY a valid JSON object with keys: title, excerpt, content (as HTML with p, h2, h3, blockquote, ul, li tags). No extra text, no markdown, no backticks.' },
              { role: 'user', content: `Translate this Arabic marine article to ${langName}:\n\n${textToTranslate}` }
            ]
          })
        });

        const data = await response.json();
        const raw = data.choices?.[0]?.message?.content || '';
        const clean = raw.replace(/\`\`\`json|\`\`\`/g, '').trim();

        let parsed;
        try { parsed = JSON.parse(clean); }
        catch(e) {
          // Fallback: try to extract JSON from the response
          const match = clean.match(/\{[\s\S]*\}/);
          parsed = match ? JSON.parse(match[0]) : null;
        }

        if (parsed) {
          translationCache[cacheKey] = parsed;
          applyTranslation(parsed, lang);
        } else {
          throw new Error('Invalid JSON response');
        }

      } catch (err) {
        console.error('Translation error:', err);
        contentEl.innerHTML = `<div style="text-align:center;padding:40px;color:#e63946">
          <p>⚠️ ${lang === 'fr' ? 'Erreur de traduction. Veuillez réessayer.' : 'Translation error. Please try again.'}</p>
          <button onclick="translateArticle('${lang}')" style="margin-top:12px;padding:8px 20px;background:var(--ocean-light);border:none;border-radius:8px;cursor:pointer;font-family:var(--font)">
            ${lang === 'fr' ? 'Réessayer' : 'Retry'}
          </button>
        </div>`;
      }
    }

    function applyTranslation(data, lang) {
      if (data.title) {
        document.getElementById('article-title').textContent = data.title;
        document.title = data.title + ' - Med Mosaic';
      }
      if (data.content) {
        document.getElementById('article-content').innerHTML = data.content;
      }
    }

    // Auth check
    const user = JSON.parse(localStorage.getItem('marine-user') || 'null');
    if (user) {
      const btn = document.getElementById('auth-btn');
      btn.textContent = user.name || 'لوحة التحكم';
      btn.href = user.role === 'admin' ? 'dashboard.html' : 'profile.html';
    }

    // Load on start
    window.addEventListener('DOMContentLoaded', () => {
      loadArticle();
      // Default to Arabic on first load of this page
      const savedLang = localStorage.getItem('medmosaic_lang') || 'ar';
      if (window.setLang) window.setLang(savedLang);
    });
  </script>
  <script src="i18n.js"></script>
</body>
</html>
